services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      PUBLIC_BASE_URL: http://localhost:8000
      GENERATE_API_TOKEN: local-secret
    volumes:
      - ./backend/outputs:/app/outputs
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      GENERATE_API_URL: http://backend:8000
      GENERATE_API_TOKEN: local-secret
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
